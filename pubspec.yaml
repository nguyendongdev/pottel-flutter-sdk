name: skyfi_sdk
description: "A new Flutter plugin project."
version: 0.0.1
homepage:

environment:
  sdk: '>=3.2.5 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  hooks_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.4
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  image: ^4.1.3
  flutter_hooks: ^0.21.2
  flutter_svg: ^2.0.10+1
  camera: ^0.10.5+9
  go_router: ^15.1.2
  dio: ^5.8.0+1
  package_info_plus: ^8.3.0
  android_id: ^0.4.0
  shared_preferences: ^2.2.3
  network_logger: ^1.0.4
  dio_cache_interceptor: ^4.0.3
  flutter_otp_text_field: ^1.5.1+1
  device_info_plus:
  change_app_package_name: ^1.5.0
  intl: ^0.19.0
  simple_circular_progress_bar: ^1.0.2
  gradient_progress_bar: ^1.0.4
  flutter_platform_widgets: ^8.0.0
  mobile_scanner: ^7.0.0
  permission_handler: ^12.0.0+1
  signature: ^6.0.0
  # syncfusion_flutter_pdfviewer: ^29.1.1
  syncfusion_flutter_pdfviewer:
    git:
      url: https://github.com/gj-loitp/lib_flutter-widgets.git
      path: packages/syncfusion_flutter_pdfviewer
  dmrtd:
    git:
#      url: https://github.com/matheonguyen73/dmrtd.git
      url: https://github.com/gj-loitp/dmrtd.git
      ref: main
  lazy_load_indexed_stack: ^1.2.1
  flutter_carousel_widget: ^3.1.0
  cached_network_image: ^3.3.1
  webview_flutter_plus: ^0.4.18
  flutter_timer_countdown: ^1.0.7
  socket_io_client: ^3.0.2
  jitsi_meet_flutter_sdk: ^11.1.1
  flutter_widget_from_html: ^0.16.0
  youtube_player_flutter: ^9.1.1
  image_picker: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.11
  freezed: ^2.4.7
  json_serializable: ^6.7.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      android:
        package: com.example.skyfi_sdk
        pluginClass: SkyfiSdkPlugin
      ios:
        pluginClass: SkyfiSdkPlugin

  # To add assets to your plugin package, add an assets section, like this:
  assets:
    - assets/images/
    - assets/icon/
    - assets/fonts/
    - assets/icons/
    - assets/data/
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/assets-and-images/#from-packages
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # To add custom fonts to your plugin package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: KoHo
      fonts:
        - asset: assets/fonts/KoHo-Regular.ttf
          weight: 400
        - asset: assets/fonts/KoHo-Bold.ttf
          weight: 700
        - asset: assets/fonts/KoHo-Medium.ttf
          weight: 500
        - asset: assets/fonts/KoHo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/KoHo-Light.ttf
          weight: 300
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_18pt-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter_18pt-Thin.ttf
  # For details regarding fonts in packages, see
  # https://flutter.dev/custom-fonts/#from-packages
